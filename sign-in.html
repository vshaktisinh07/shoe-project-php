<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registation/Log-in</title>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playwrite+IN+Guides&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="sign-in.css" />
  </head>
  <body>
    <div class="container">
      <div class="form-box login">
        <form action="" novalidate>
          <h1>Login</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required />
            <i class="bx bxs-user"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="password" required />
            <i class="bx bxs-lock"></i>
          </div>
          <div class="forget-link">
            <a href="forgot.html">Forget Password?</a>
          </div>
          <button type="submit" class="btn">Login</button>
          <p>Login with social platforms</p>
          <div class="social-icons">
            <a href="#"><i class="bx bxl-google"></i></a>
            <a href="#"><i class="bx bxl-facebook"></i></a>
            <a href="#"><i class="bx bxl-github"></i></a>
            <a href="#"><i class="bx bxl-linkedin"></i></a>
          </div>
        </form>
      </div>

      <!-- Registation -->

      <div class="form-box registation">
        <form action="" novalidate>
          <h1>Registation</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required />
            <i class="bx bxs-user"></i>
          </div>
          <div class="input-box">
            <input type="email" placeholder="Email123@gmail.com" required />
            <i class="bx bxs-envelope"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="password" required />
            <i class="bx bxs-lock"></i>
          </div>

          <button type="submit" class="btn">Register</button>
          <p>Register with social platforms</p>
          <div class="social-icons">
            <a href="#"><i class="bx bxl-google"></i></a>
            <a href="#"><i class="bx bxl-facebook"></i></a>
            <a href="#"><i class="bx bxl-github"></i></a>
            <a href="#"><i class="bx bxl-linkedin"></i></a>
          </div>
        </form>
      </div>

      <div class="toggle-box">
        <div class="toggel-panel toggle-left">
          <h1>Hello, Welcome!</h1>
          <p>Don't Have an account ?</p>
          <button class="btn register-btn">Register</button>
        </div>
        <div class="toggel-panel toggle-right">
          <h1>Welcome Back!</h1>
          <p>Already Have an account ?</p>
          <button class="btn login-btn">Login</button>
        </div>
      </div>
    </div>

    <script src="sign-in.js"></script>
  </body>
</html>
