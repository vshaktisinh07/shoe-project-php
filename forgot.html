<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FORGOT PASSWORD!</title>
    <link rel="stylesheet" href="forgot.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playwrite+IN+Guides&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
  </head>
  <body>
    <div class="container step1">
      <h2>OTP Verification</h2>
      <br />
      <h4>Enter your email address</h4>
      <br />
      <p>You will receive an email with a one-time password</p>

      <div class="form-group">
        <input
          type="email"
          id="emailAddress"
          placeholder="Email address"
          onkeyup="validateEmail(this.value)"
        />
        <i class="bx bxs-envelope"></i>
      </div>
      <button class="nextbutton">Next &rarr;</button>
    </div>

    <div class="container step2">
      <h2>OTP Verification</h2>
      <br />
      <h4>Enter One-Time Password</h4>
      <br />
      <p>A One-Time password has been sent to <span id="verifyEmail"></span></p>

      <div class="otp-form">
        <p>Enter the 4 digit code we sent you via email to continue</p>
        <div class="otp-group">
          <input type="number" />
          <input type="number" />
          <input type="number" />
          <input type="number" />
        </div>
        <p>
          Not your Eamil ? / Did't receive the code yet ?<a
            href="javascript:void(0)"
            >Try Again</a
          >
        </p>
      </div>
      <button class="verifyButton">Verify &rarr;</button>
    </div>

    <script src="forgot.js"></script>
  </body>
</html>
